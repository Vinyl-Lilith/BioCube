services:
  # ─── Backend API + WebSocket server ───
  - type: web
    name: biocube-backend
    env: node
    rootDir: packages/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false          # e.g. https://biocube.onrender.com

  # ─── Frontend static site ───
  - type: web
    name: biocube-frontend
    env: static
    rootDir: packages/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # e.g. https://biocube-backend.onrender.com
      - key: VITE_WS_URL
        sync: false          # e.g. wss://biocube-backend.onrender.com
