<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0f0d" />
    <title>BioCube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&family=Oxanium:wght@300;400;600;800&family=Unbounded:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      /* Lock mobile into portrait mode */
      @media screen and (orientation: landscape) and (max-width: 768px) {
        body::before {
          content: 'Please rotate your device to portrait mode 📲';
          position: fixed; inset: 0;
          display: flex; align-items: center; justify-content: center;
          background: #0a0f0d;
          color: #3dff7a;
          font-family: 'JetBrains Mono', monospace;
          font-size: 14px;
          text-align: center;
          padding: 24px;
          z-index: 9999;
        }
        body > * { display: none !important; }
      }
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0f0d; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
